<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Summary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>
<body>

    <!-- search bar -->
    <section id="search-bar">
        <div class="search"><input type="text" id="username" placeholder="E.g : samarkumar4355"></div>
        <button id="search-btn" onclick="GetDetails()"> Search</button>
    </section>


    <!-- personal informatoin -->
    <section id="personal-info">
        <h2 id="profile-heading" style="color: white;">See Github Summary By Using Username</h2>
         
        <div id="personal-div">

           <div id="personal-img">
             <!-- image will be shown here -->
           </div>

           <div id="personal-details">  
            <!--personal details will be shown here -->
           </div>

       </div>

    </section>

    <!-- followers details -->

    <section id="follow-info" style="margin-top: 5vh;">
         <h2 id="info" style="color: white; text-align: center;"> </h2>
       
            <!-- followers card details will be shown here -->
      

    </section>


    <!-- footer -->

    <section id="footer">
        <hr>
        <h3>Created by Samar with ☕️ </h3>
    </section>

   <script src="app.js"></script>
</body>
</html>
